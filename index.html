<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アカペラの森 - Top</title>
  
  <!-- Google Fonts: 優しい丸ゴシック 'Zen Maru Gothic' -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons (アイコンフォントの読み込み) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- 全てのデザインを担当するCSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="body-layout">

  <!-- PC表示用のぼかしテーブル背景 -->
  <div class="pc-bg-image"></div>

  <!-- メインコンテナ：幅 390px / 高さ 847px 固定 -->
  <main class="main-container">

    <!-- ==========================================
         ヘッダー / メインビジュアル
         ========================================== -->
    <header class="top-header">
      <!-- メイン背景画像 -->
      <div class="top-bg-image"></div>
      
      <!-- やわらかな光のレイヤーと木漏れ日エフェクト -->
      <div class="light-filter"></div>
      <div class="komorebi-bg"></div>

      <!-- MENUボタン -->
      <div class="menu-container">
        <button id="menu-btn" class="menu-btn">
          <!-- 白い2本線 -->
          <div class="menu-btn-lines">
            <span class="line"></span>
            <span class="line"></span>
          </div>
          <!-- MENUテキスト -->
          <span class="menu-btn-text">MENU</span>
        </button>
      </div>

      <!-- コピー＆タイトル -->
      <div class="header-content">
        <h1 class="main-title">アカペラの森</h1>
        <p class="sub-title">
          楽しいサークルLifeを<br>
          始めたいあなたに
        </p>
      </div>

      <!-- 下部へのインジケータ（下矢印） -->
      <div class="indicator-container">
        <div class="scroll-arrow">
          <i data-lucide="chevron-down" class="arrow-icon"></i>
        </div>
      </div>
    </header>

    <!-- ==========================================
         ナビゲーションドロワーメニュー (初期状態は非表示)
         ========================================== -->
    <div id="navigation-menu" class="navigation-menu">
      <div class="menu-modal">
        <!-- ドロワーのヘッダー部 -->
        <div class="menu-modal-header">
          <h3 class="menu-modal-title">
            <i data-lucide="compass" class="title-icon"></i> メニュー
          </h3>
          <button id="menu-close-btn" class="close-btn">
            <i data-lucide="x" class="close-icon"></i>
          </button>
        </div>
        
        <!-- ドロワーの中身（リンク） -->
        <div class="menu-modal-body">
          <div class="menu-item">サークル紹介</div>
          <div class="menu-item">初めての方へ</div>
          <div class="menu-item">活動日程</div>
          <hr class="menu-divider">
          <button id="menu-bottom-close-btn" class="menu-bottom-close-btn">
            閉じる
          </button>
        </div>
      </div>
    </div>

  </main>

  <!-- 外部JavaScriptの読み込み -->
  <script src="script.js"></script>
</body>
</html>
