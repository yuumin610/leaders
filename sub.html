<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>初めてガイド</title>
  <link rel="stylesheet" href="css/sub.css" />
  <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&family=Zen+Kaku+Gothic+New:wght@500&family=Noto+Sans:wght@600;700&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="page">

    <!-- Background image -->
    <div class="subpage-bg">
      <img src="image/guide-bg.jpg" alt="" class="bg-img" />
    </div>

    <!-- Green footer -->
    <div class="footer"></div>

    <!-- Guide heading -->
    <div class="guide-heading">
      <div class="frag">
        <svg fill="none" viewBox="0 0 28.6438 37.9999">
          <line stroke="#42301D" x1="7.50022" x2="7.50022" y1="3.99994" y2="37.9999"/>
          <path d="M28.6307 12.295L7.15615 22.0824L7.17884 1.70899L28.6307 12.295Z" fill="#E16B8C"/>
        </svg>
      </div>
      <p class="guide-title">初めてガイド</p>
      <a class="menu-button" href="index.html" aria-label="メインページに戻る">
        <svg fill="none" viewBox="0 0 51 50">
          <ellipse cx="25.5" cy="25" fill="#42301D" rx="25.5" ry="25"/>
        </svg>
        <div class="menu-line menu-line1"></div>
        <div class="menu-line menu-line2"></div>
        <span class="menu-label">MENU</span>
      </a>
    </div>

    <!-- Steps -->
    <div class="steps">

      <!-- Step 1 -->
      <div class="step-wrapper">
        <p class="step-label">Step 1</p>
        <div class="card">
          <div class="illus-box illus-box--step1">
            <svg fill="none" viewBox="0 0 119.147 105.5">
              <path d="M54.5002 37C49.0002 55.5 41.3002 92.6 54.5002 93" stroke="#42301D"/>
              <path d="M54.4942 37.5C57.8512 22.1867 54.6956 -6.35163 15.2171 2.00106C-24.2614 10.3538 24.9524 29.1473 54.4942 37.5Z" fill="#33AD8B" stroke="#33AD8B"/>
              <path d="M55.4446 36.8594C57.6855 21.497 70.695 -3.77049 104.806 18.0597C138.917 39.8898 86.1113 39.6887 55.4446 36.8594Z" fill="#33AD8B" stroke="#33AD8B"/>
              <ellipse cx="48.0002" cy="91" fill="#B59577" rx="31.5" ry="14.5"/>
            </svg>
          </div>
          <div class="text-block">
            <p class="step-title">楽譜覚えよう</p>
            <div class="underline" style="width:96px"></div>
            <p class="step-desc">まずは楽譜を聴いて、見て覚えていきましょう。繰り返していくのが上達のコツです！つられないように自分のパート以外も聴いてみるのもおすすめ</p>
          </div>
          <button class="done-btn" data-index="0">できた！</button>
        </div>
      </div>

      <!-- Step 2 -->
      <div class="step-wrapper">
        <p class="step-label">Step２</p>
        <div class="card">
          <div class="illus-box illus-box--step2">
            <svg fill="none" viewBox="0 0 85.1139 124.186">
              <path d="M29.699 40.7185C21.7096 29.688 42.1579 15.8044 55.2805 8.32956C96.4805 -17.2704 85.4473 25.9962 74.7807 50.8296C64.114 75.6629 45.2807 54.8296 45.2807 54.8296L29.699 40.7185Z" fill="#E7C0CB"/>
              <path d="M29.7805 40.8296C21.5721 29.7814 42.1138 15.8296 55.2805 8.32956C96.4805 -17.2704 85.4473 25.9962 74.7807 50.8296C64.114 75.6629 45.2807 54.8296 45.2807 54.8296L29.699 40.7185" stroke="#E16B8C"/>
              <path d="M39.8653 122.831C43.9505 107.811 55.4532 81.9425 71.1 91.3306C87.1 100.931 56.9435 116.331 39.8653 122.831Z" fill="#33AD8B"/>
              <path d="M39.2806 123.33C37.614 113.996 21.9 86.7305 5.09997 92.3305C-11.7 97.9306 21.614 115.163 39.2806 123.33Z" fill="#33AD8B"/>
              <path d="M47.2807 56.3295C40.7363 77.6848 30.7658 120.982 43.2386 123.33" stroke="#33AD8B"/>
            </svg>
          </div>
          <div class="text-block">
            <p class="step-title">チームの人と合わせてみよう</p>
            <div class="underline" style="width:205px"></div>
            <p class="step-desc">スキャットが違ったり、タイミングが異なっていたりしませんか？アドバイスをもらってみるのもいいですね！</p>
          </div>
          <button class="done-btn" data-index="1">できた！</button>
        </div>
      </div>

      <!-- Step 3 -->
      <div class="step-wrapper">
        <p class="step-label">Step３</p>
        <div class="card">
          <div class="illus-box illus-box--step3">
            <svg fill="none" viewBox="0 0 102.237 151.5">
              <rect fill="#B59577" height="74" width="28" x="35.0002" y="77.5"/>
              <path d="M49.0002 65.5C49.0002 75.9934 40.4936 84.5 30.0002 84.5C19.5068 84.5 11.0002 75.9934 11.0002 65.5C11.0002 55.0066 19.5068 46.5 30.0002 46.5C40.4936 46.5 49.0002 55.0066 49.0002 65.5Z" fill="#33AD8B"/>
              <path d="M38 42.0782C38 52.5716 29.4934 61.0782 19 61.0782C8.50659 61.0782 0 52.5716 0 42.0782C0 31.5848 8.50659 23.0782 19 23.0782C29.4934 23.0782 38 31.5848 38 42.0782Z" fill="#33AD8B"/>
              <path d="M102.237 42.0782C102.237 52.5717 93.7303 61.0782 83.2369 61.0782C72.7435 61.0782 64.2369 52.5717 64.2369 42.0782C64.2369 31.5848 72.7435 23.0782 83.2369 23.0782C93.7303 23.0782 102.237 31.5848 102.237 42.0782Z" fill="#33AD8B"/>
              <path d="M56.5613 19C56.5613 29.4934 48.0547 38 37.5613 38C27.0679 38 18.5613 29.4934 18.5613 19C18.5613 8.50659 27.0679 0 37.5613 0C48.0547 0 56.5613 8.50659 56.5613 19Z" fill="#33AD8B"/>
              <path d="M89 27.5C89 37.9934 80.4934 46.5 70 46.5C59.5066 46.5 51 37.9934 51 27.5C51 17.0066 59.5066 8.50004 70 8.50004C80.4934 8.50004 89 17.0066 89 27.5Z" fill="#33AD8B"/>
              <circle cx="77.0002" cy="68.5" fill="#33AD8B" r="19"/>
              <path d="M67.9999 69C67.9999 79.4934 59.4933 88 48.9999 88C38.5065 88 29.9999 79.4934 29.9999 69C29.9999 58.5066 38.5065 50 48.9999 50C59.4933 50 67.9999 58.5066 67.9999 69Z" fill="#33AD8B"/>
              <path d="M68.9999 42.5C68.9999 52.9934 60.4933 61.5 49.9999 61.5C39.5065 61.5 30.9999 52.9934 30.9999 42.5C30.9999 32.0066 39.5065 23.5 49.9999 23.5C60.4933 23.5 68.9999 32.0066 68.9999 42.5Z" fill="#33AD8B"/>
            </svg>
          </div>
          <div class="text-block">
            <p class="step-title">自信をもって歌える！</p>
            <div class="underline" style="width:155px"></div>
            <p class="step-desc">練習中に録音したりします。自分の声がどうなっているか聴いていますか？１パート１人のアカペラではあなたの声が不可欠です。自信をもって歌ってみましょう！</p>
          </div>
          <button class="done-btn" data-index="2">できた！</button>
        </div>
      </div>

    </div>

    <!-- Back button -->
    <a href="index.html" class="back-btn">メインページに戻る</a>

  </div>

  <script src="js/sub.js"></script>
</body>
</html>
